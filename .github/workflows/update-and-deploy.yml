name: Actualizar catálogo y publicar

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Actualizar desde Wikipedia y Wikidata
        run: node scripts/update-catalog.mjs

      - name: Validar addon
        run: node scripts/validate.mjs

      - name: Guardar último catálogo válido
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data public/catalog
          git diff --cached --quiet || git commit -m "chore: actualizar catálogo IMAX [skip ci]"
          git push

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empaquetar sitio
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
